<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#409eff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1677ff;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- 圆角方形背景 -->
  <rect width="100" height="100" rx="20" fill="url(#grad1)"/>
  <!-- 机器人头部 -->
  <rect x="25" y="25" width="50" height="45" rx="8" fill="white"/>
  <!-- 眼睛 -->
  <circle cx="38" cy="42" r="6" fill="#409eff"/>
  <circle cx="62" cy="42" r="6" fill="#409eff"/>
  <!-- 嘴巴 -->
  <rect x="35" y="55" width="30" height="4" rx="2" fill="#67c23a"/>
  <!-- 天线 -->
  <line x1="50" y1="25" x2="50" y2="15" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <circle cx="50" cy="12" r="4" fill="#e6a23c"/>
</svg>
